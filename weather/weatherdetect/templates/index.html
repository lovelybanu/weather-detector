<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home page</title>
    <script src="https://kit.fontawesome.com/f04720e4eb.js" crossorigin="anonymous"></script>
    <style>
        h1{
            text-align: center;
        }
        .container{
            margin: 0px 500px;
            width: auto;
            display: flex;

        }
        input{
            width: 250px;
            padding: 4px;
            padding-left: 10px;
        }
        button{
            height: 30px;
            width: 35px;
        }
        .data-div{
            margin: 0px 510px;
        }
    </style>
</head>
<body>
    <h1>Weather Detector</h1>
    <form action="" method="post" >
        {% csrf_token %}
        <div class="container">
            <input type="text" placeholder="Enter the city/town?" name="city">
            <div >
            <button type="submit"><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>
    </div>
    </form>
    {% if data.countrycode %}
    <div class="data-div">
        <h1>{{city}}</h1>
    <h5>Country Code : {{data.countrycode}}</h5>
    <h5>temp : {{data.temp}} </h5>
    <h5>pressure : {{data.pressure}}</h5>
    <h5>humidity : {{data.humidity}}</h5>
</div>
{% endif %}
</body>
</html>
